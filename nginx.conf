server {
 server_name techdoc.uz www.techdoc.uz;
 charset off;
 index index.php index.html;
 disable_symlinks if_not_owner from=$root_path;
 include /etc/nginx/vhosts-includes/*.conf;
 include /etc/nginx/vhosts-resources/techdoc.uz/*.conf;
 include /etc/nginx/users-resources/www-root/*.conf;
 access_log /var/www/httpd-logs/techdoc.uz.access.log;
 error_log /var/www/httpd-logs/techdoc.uz.error.log notice;
 set $root_path /var/www/www-root/data/www/techdoc.uz;
 root $root_path;
 listen 5.129.208.55:80;
 gzip on;
 gzip_comp_level 5;
 gzip_disable "msie6";
 gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml;
 location / {
  proxy_pass http://127.0.0.1:3008;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection 'upgrade';
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_cache_bypass $http_upgrade;
 }
 location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|webp|woff|woff2)$ {
  expires 24h;
  proxy_pass http://127.0.0.1:3008;
  proxy_set_header Host $host;
 }
}
server {
 server_name techdoc.uz www.techdoc.uz;
 ssl_certificate "/var/www/httpd-cert/www-root/techdoc.uz_le1.crtca";
 ssl_certificate_key "/var/www/httpd-cert/www-root/techdoc.uz_le1.key";
 ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
 ssl_prefer_server_ciphers on;
 ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
 ssl_dhparam /etc/ssl/certs/dhparam4096.pem;
 charset off;
